<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字卡 - Vocabulary Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .vocab-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .vocab-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .vocab-info {
            flex: 1;
            min-width: 200px;
        }

        .vocab-word {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .vocab-meta {
            font-size: 0.9em;
            color: #666;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .vocab-sentence {
            font-size: 0.95em;
            color: #555;
            font-style: italic;
            margin-top: 8px;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        /* 卡片模式樣式 */
        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .stats p {
            font-size: 1.2em;
            margin: 5px 0;
        }

        .card {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1.2;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            perspective: 1000px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            min-height: 400px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            width: 100%;
        }

        .card-back {
            transform: rotateY(180deg);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .card-word {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }

        .card-pos {
            font-size: 1.2em;
            color: #666;
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .card-sentence {
            font-size: 1.1em;
            color: #555;
            font-style: italic;
            line-height: 1.6;
            margin-top: 20px;
        }

        .card-hint {
            font-size: 0.9em;
            color: #999;
            margin-top: 30px;
            font-style: italic;
        }

        .card-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-card {
            padding: 12px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-card:hover {
            background: #5568d3;
        }

        .btn-card:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .date-section {
            margin-bottom: 30px;
        }

        .date-header {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            padding: 10px 0;
            border-bottom: 2px solid #667eea;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .tab-content {
                padding: 20px;
            }

            .card {
                padding: 25px;
                min-height: 350px;
            }

            .card-word {
                font-size: 2.2em;
            }

            .card-sentence {
                font-size: 1em;
            }

            .button-group {
                flex-direction: column;
            }
        }

        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #333;
        }

        .info-box strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 英文單字卡</h1>
            <p>Vocabulary Builder - 背單字、學例句、自我測驗</p>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('add')">新增單字</button>
            <button class="tab-btn" onclick="switchTab('browse')">瀏覽單字</button>
            <button class="tab-btn" onclick="switchTab('study')">單字卡</button>
            <button class="tab-btn" onclick="switchTab('stats')">統計</button>
        </div>

        <!-- 新增單字 Tab -->
        <div id="add" class="tab-content active">
            <h2>新增單字</h2>
            <div class="info-box">
                <strong>💡 提示：</strong>輸入單字、詞性和例句，系統會自動按日期分類。
            </div>

            <div class="input-group">
                <label for="word">英文單字 *</label>
                <input type="text" id="word" placeholder="例：beautiful" required>
            </div>

            <div class="input-group">
                <label for="pos">詞性 *</label>
                <select id="pos" required>
                    <option value="">-- 選擇詞性 --</option>
                    <option value="名詞">名詞 (Noun)</option>
                    <option value="動詞">動詞 (Verb)</option>
                    <option value="形容詞">形容詞 (Adjective)</option>
                    <option value="副詞">副詞 (Adverb)</option>
                    <option value="介詞">介詞 (Preposition)</option>
                    <option value="代詞">代詞 (Pronoun)</option>
                    <option value="連詞">連詞 (Conjunction)</option>
                    <option value="冠詞">冠詞 (Article)</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="input-group">
                <label for="sentence">例句 *</label>
                <textarea id="sentence" placeholder="例：The beautiful sunset painted the sky with orange and pink colors." required></textarea>
            </div>

            <div class="input-group">
                <label for="translation">例句中文翻譯 (選填)</label>
                <textarea id="translation" placeholder="例：美麗的夕陽將天空染成橙色和粉紅色。" style="min-height: 60px;"></textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="addVocab()">保存單字</button>
                <button class="btn-secondary" onclick="clearForm()">清除</button>
            </div>
            <div id="message" style="margin-top: 15px; text-align: center;"></div>
        </div>

        <!-- 瀏覽單字 Tab -->
        <div id="browse" class="tab-content">
            <h2>瀏覽單字</h2>
            <div class="filter-group">
                <select id="filterPos" onchange="filterVocab()">
                    <option value="">全部詞性</option>
                    <option value="名詞">名詞</option>
                    <option value="動詞">動詞</option>
                    <option value="形容詞">形容詞</option>
                    <option value="副詞">副詞</option>
                    <option value="介詞">介詞</option>
                    <option value="代詞">代詞</option>
                    <option value="連詞">連詞</option>
                    <option value="冠詞">冠詞</option>
                    <option value="其他">其他</option>
                </select>
                <input type="text" id="searchWord" placeholder="搜尋單字..." onkeyup="filterVocab()" style="flex: 1;">
            </div>
            <div id="vocabList" class="vocab-list"></div>
        </div>

        <!-- 單字卡 Tab -->
        <div id="study" class="tab-content">
            <h2>單字卡 - 本週複習</h2>
            <div class="info-box">
                <strong>📅 本週單字：</strong><span id="weekInfo"></span> | 點擊卡片翻轉查看答案
            </div>
            
            <div class="card-container">
                <div class="stats">
                    <p id="cardStats">準備就緒</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="cardArea" class="card" onclick="toggleCard()">
                    <div class="card-front">
                        <p style="color: #999; margin-bottom: 20px;">例句</p>
                        <div id="sentenceDisplay" style="font-size: 1.2em; line-height: 1.8; color: #333;"></div>
                        <div class="card-hint">點擊卡片查看答案</div>
                    </div>
                    <div class="card-back">
                        <div class="card-word" id="answerWord"></div>
                        <div class="card-pos" id="answerPos"></div>
                        <div class="card-sentence" id="answerSentence"></div>
                    </div>
                </div>

                <div class="card-controls">
                    <button class="btn-card" onclick="prevCard()" id="prevBtn">← 上一張</button>
                    <button class="btn-card" onclick="nextCard()" id="nextBtn">下一張 →</button>
                </div>

                <div id="noCardsMessage" style="display: none; text-align: center; color: #999; padding: 40px;">
                    <p>本週還沒有單字。趕快去新增吧！</p>
                </div>
            </div>
        </div>

        <!-- 統計 Tab -->
        <div id="stats" class="tab-content">
            <h2>學習統計</h2>
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        // ===== 基礎操作 =====
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'browse') filterVocab();
            if (tabName === 'study') initStudyMode();
            if (tabName === 'stats') updateStats();
        }

        // ===== localStorage 操作 =====
        function getVocabList() {
            return JSON.parse(localStorage.getItem('vocabList')) || [];
        }

        function saveVocabList(list) {
            localStorage.setItem('vocabList', JSON.stringify(list));
        }

        // ===== 新增單字 =====
        function addVocab() {
            const word = document.getElementById('word').value.trim();
            const pos = document.getElementById('pos').value;
            const sentence = document.getElementById('sentence').value.trim();
            const translation = document.getElementById('translation').value.trim();
            const messageEl = document.getElementById('message');

            if (!word || !pos || !sentence) {
                messageEl.innerHTML = '<span style="color: #ff6b6b;">❌ 請填寫必填欄位</span>';
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            const newVocab = {
                id: Date.now(),
                word: word,
                pos: pos,
                sentence: sentence,
                translation: translation,
                date: today,
                createTime: new Date().toLocaleString('zh-TW')
            };

            let list = getVocabList();
            list.push(newVocab);
            saveVocabList(list);

            messageEl.innerHTML = `<span style="color: #667eea;">✅ 已保存！ "${word}" 已加入你的單字庫</span>`;
            clearForm();

            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 3000);
        }

        function clearForm() {
            document.getElementById('word').value = '';
            document.getElementById('pos').value = '';
            document.getElementById('sentence').value = '';
            document.getElementById('translation').value = '';
            document.getElementById('word').focus();
        }

        // ===== 瀏覽和篩選 =====
        function filterVocab() {
            const filterPos = document.getElementById('filterPos').value;
            const searchWord = document.getElementById('searchWord').value.toLowerCase();
            let list = getVocabList();

            let filtered = list.filter(item => {
                const matchPos = !filterPos || item.pos === filterPos;
                const matchWord = !searchWord || item.word.toLowerCase().includes(searchWord);
                return matchPos && matchWord;
            });

            // 按日期倒序分組
            const grouped = {};
            filtered.forEach(item => {
                if (!grouped[item.date]) grouped[item.date] = [];
                grouped[item.date].push(item);
            });

            const dates = Object.keys(grouped).sort().reverse();

            if (dates.length === 0) {
                document.getElementById('vocabList').innerHTML = '<div class="empty-state"><p>沒有找到符合條件的單字</p></div>';
                return;
            }

            let html = '';
            dates.forEach(date => {
                const dateObj = new Date(date);
                const dateStr = dateObj.toLocaleDateString('zh-TW', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    weekday: 'short'
                });

                html += `<div class="date-section">
                    <div class="date-header">${dateStr}</div>`;

                grouped[date].forEach(item => {
                    html += `<div class="vocab-item">
                        <div class="vocab-info">
                            <div class="vocab-word">${item.word}</div>
                            <div class="vocab-meta">
                                <span class="tag">${item.pos}</span>
                            </div>
                            <div class="vocab-sentence">${item.sentence}</div>
                        </div>
                        <button class="btn-danger" onclick="deleteVocab(${item.id})">刪除</button>
                    </div>`;
                });

                html += '</div>';
            });

            document.getElementById('vocabList').innerHTML = html;
        }

        function deleteVocab(id) {
            if (confirm('確定要刪除這個單字嗎？')) {
                let list = getVocabList();
                list = list.filter(item => item.id !== id);
                saveVocabList(list);
                filterVocab();
            }
        }

        // ===== 單字卡模式 =====
        let currentCardIndex = 0;
        let weekVocabs = [];
        let isCardFlipped = false;

        function getWeekStartDate() {
            const today = new Date();
            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1);
            const weekStart = new Date(today.setDate(diff));
            return weekStart.toISOString().split('T')[0];
        }

        function initStudyMode() {
            isCardFlipped = false;
            const weekStart = getWeekStartDate();
            const weekEnd = new Date(new Date(weekStart).getTime() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            let list = getVocabList();
            weekVocabs = list.filter(item => item.date >= weekStart && item.date <= weekEnd);

            // 打亂順序
            weekVocabs.sort(() => Math.random() - 0.5);

            const startDate = new Date(weekStart);
            const weekInfo = `${startDate.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' })} - 本週`;
            document.getElementById('weekInfo').textContent = weekInfo;

            if (weekVocabs.length === 0) {
                document.getElementById('cardArea').style.display = 'none';
                document.getElementById('noCardsMessage').style.display = 'block';
                document.getElementById('cardStats').textContent = '本週還沒有單字';
                return;
            }

            document.getElementById('cardArea').style.display = 'flex';
            document.getElementById('noCardsMessage').style.display = 'none';
            currentCardIndex = 0;
            displayCard();
        }

        function displayCard() {
            if (weekVocabs.length === 0) return;

            const card = weekVocabs[currentCardIndex];
            const progress = ((currentCardIndex + 1) / weekVocabs.length * 100).toFixed(0);

            // 挖空單字在例句中
            const sentenceWithBlank = card.sentence.replace(
                new RegExp(`\\b${card.word}\\b`, 'gi'),
                '________'
            );

            document.getElementById('sentenceDisplay').textContent = sentenceWithBlank;
            document.getElementById('answerWord').textContent = card.word;
            document.getElementById('answerPos').textContent = card.pos;
            document.getElementById('answerSentence').textContent = card.sentence;
            document.getElementById('cardStats').innerHTML = `
                ${currentCardIndex + 1} / ${weekVocabs.length} 
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
            `;

            // 重置卡片翻轉
            isCardFlipped = false;
            document.getElementById('cardArea').classList.remove('flipped');

            // 更新按鈕狀態
            document.getElementById('prevBtn').disabled = currentCardIndex === 0;
            document.getElementById('nextBtn').disabled = currentCardIndex === weekVocabs.length - 1;
        }

        function toggleCard() {
            isCardFlipped = !isCardFlipped;
            document.getElementById('cardArea').classList.toggle('flipped');
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard();
            }
        }

        function nextCard() {
            if (currentCardIndex < weekVocabs.length - 1) {
                currentCardIndex++;
                displayCard();
            }
        }

        // ===== 統計 =====
        function updateStats() {
            let list = getVocabList();
            
            if (list.length === 0) {
                document.getElementById('statsContent').innerHTML = '<div class="empty-state"><p>還沒有單字數據</p></div>';
                return;
            }

            // 按日期統計
            const dateStats = {};
            list.forEach(item => {
                if (!dateStats[item.date]) dateStats[item.date] = 0;
                dateStats[item.date]++;
            });

            // 按詞性統計
            const posStats = {};
            list.forEach(item => {
                if (!posStats[item.pos]) posStats[item.pos] = 0;
                posStats[item.pos]++;
            });

            // 本週統計
            const weekStart = getWeekStartDate();
            const weekEnd = new Date(new Date(weekStart).getTime() + 6 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            const weekCount = list.filter(item => item.date >= weekStart && item.date <= weekEnd).length;

            let html = `
                <div class="stats" style="background: white; color: #333; border: 2px solid #667eea;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                        <div style="text-align: center;">
                            <p style="font-size: 2.5em; color: #667eea; margin: 10px 0;">${list.length}</p>
                            <p>總單字數</p>
                        </div>
                        <div style="text-align: center;">
                            <p style="font-size: 2.5em; color: #667eea; margin: 10px 0;">${weekCount}</p>
                            <p>本週新增</p>
                        </div>
                    </div>
                </div>

                <h3 style="margin-top: 30px; color: #667eea;">每日進度</h3>
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
            `;

            const sortedDates = Object.keys(dateStats).sort();
            sortedDates.forEach(date => {
                const dateObj = new Date(date);
                const dateStr = dateObj.toLocaleDateString('zh-TW', { 
                    month: 'short', 
                    day: 'numeric',
                    weekday: 'short'
                });
                html += `<p>📅 ${dateStr}: <strong style="color: #667eea;">${dateStats[date]}</strong> 個單字</p>`;
            });

            html += '</div><h3 style="margin-top: 30px; color: #667eea;">詞性分布</h3><div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">';

            Object.keys(posStats).sort().forEach(pos => {
                const count = posStats[pos];
                const percent = ((count / list.length) * 100).toFixed(1);
                html += `<p>${pos}: <strong style="color: #667eea;">${count}</strong> 個 (${percent}%)</p>`;
            });

            html += '</div>';
            document.getElementById('statsContent').innerHTML = html;
        }

        // 初始化
        window.addEventListener('load', () => {
            filterVocab();
        });
    </script>
</body>
</html>
